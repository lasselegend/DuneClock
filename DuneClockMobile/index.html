<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Dune Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --panel: #161616;
    --border: #2a2a2a;
    --accent: #c8a84b;
    --text: #e8e8e0;
    --muted: #555;
    --active-glow: 0 0 30px rgba(200,168,75,0.4), 0 0 60px rgba(200,168,75,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
  }

  /* ── Setup screen ── */
  .setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .setup-screen h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.25em;
    color: var(--muted);
  }

  .player-count-btns { display: flex; gap: 16px; }

  .count-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    width: 110px;
    height: 110px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .count-btn span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .count-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--active-glow);
    background: #1a1700;
  }
  .count-btn:hover span { color: var(--accent); }

  /* ── Clock UI ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    width: min(96vw, 680px);
    height: min(60vh, 560px);
  }

  .player {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    user-select: none;
    -webkit-user-select: none;
  }

  .player:hover:not(.dead):not(.active) { border-color: #444; }

  .player.active {
    border-color: var(--accent);
    box-shadow: var(--active-glow);
    background: #1a1700;
  }

  .player.dead {
    background: #1a0a0a;
    border-color: #3a1a1a;
    cursor: default;
    opacity: 0.5;
  }

  .player-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 0.5rem;
    transition: color 0.15s;
  }

  .timer {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    letter-spacing: 0.05em;
    color: var(--text);
    transition: color 0.15s;
  }

  .player.dead .timer { color: #5a1a1a; }
  .timer.warning { color: #c84b4b !important; }

  .active-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    position: absolute;
    top: 14px; right: 14px;
    animation: pulse 1s infinite;
    display: none;
  }
  .player.active .active-dot { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 0.6rem;
    align-items: center;
  }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    padding: 0.5rem 1.2rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  button:hover { border-color: #555; color: var(--text); }
  button.primary { border-color: var(--accent); color: var(--accent); }
  button.primary:hover { background: rgba(200,168,75,0.1); }

  #pause-btn {
    font-size: 1rem;
    padding: 0.5rem 3rem;
    letter-spacing: 0.2em;
    margin-top: 0.4rem;
    width: min(96vw, 680px);
  }
  #pause-btn.primary { border-color: var(--accent); color: var(--accent); }
  #pause-btn.primary:hover { background: rgba(200,168,75,0.1); }

  .name-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    width: 140px;
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.3rem 0.5rem;
    border-radius: 2px;
    outline: none;
    letter-spacing: 0.05em;
  }
  .name-input:focus { border-color: var(--accent); }

  /* ── Color swatches ── */
  .color-swatches { display: flex; gap: 6px; align-items: center; }

  .swatch {
    width: 22px; height: 22px;
    border-radius: 2px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.selected { border-color: var(--text); }

  .hint {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
    opacity: 0.6;
  }

  @media (max-height: 700px) {
    .hint { display: none; }
    h1 { margin-bottom: 0.4rem; }
  }

  /* ── Settings modal ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  .modal {
    background: #111;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    width: min(90vw, 460px);
  }

  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 1.5rem;
    font-size: 1.2rem;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .setting-row label {
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  .time-input { display: flex; gap: 6px; align-items: center; }

  .time-input input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    width: 52px;
    text-align: center;
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.3rem 0.4rem;
    border-radius: 2px;
    outline: none;
  }
  .time-input input:focus { border-color: var(--accent); }
  .time-input span { color: var(--muted); font-size: 0.9rem; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 1.5rem;
  }
</style>
</head>
<body>

<h1>Dune Clock</h1>

<!-- Setup screen -->
<div class="setup-screen" id="setup">
  <h2>Number of Players</h2>
  <div class="player-count-btns">
    <button class="count-btn" onclick="startGame(3)">3<span>PLAYERS</span></button>
    <button class="count-btn" onclick="startGame(4)">4<span>PLAYERS</span></button>
  </div>
</div>

<!-- Clock screen -->
<div id="clock-ui" style="display:none; flex-direction:column; align-items:center;">
  <div class="grid" id="grid"></div>
  <div class="controls">
    <button onclick="goToSetup()">&#8592; Back</button>
    <button onclick="resetClocks()">Reset</button>
    <button class="primary" onclick="openSettings()">Settings</button>
  </div>
  <button id="pause-btn" onclick="togglePause()">Pause</button>
  <p class="hint">Click the active player's panel to pass the turn</p>
</div>

<!-- Settings Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Time Settings</h2>
    <div id="settings-rows"></div>
    <div class="modal-footer">
      <button onclick="closeSettings()">Cancel</button>
      <button class="primary" onclick="applySettings()">Apply &amp; Reset</button>
    </div>
  </div>
</div>

<script>
  let NAMES  = ["Player 1","Player 2","Player 3","Player 4"];
  // Muted, desert-toned palette: gold, sage, rust, dusty-blue
  const PALETTE = [
    { name: 'gold',  hex: '#c8a84b' },
    { name: 'green', hex: '#5aaa7a' },
    { name: 'red',   hex: '#c85a4b' },
    { name: 'blue',  hex: '#4b82c8' },
  ];
  let COLORS = ["#c8a84b","#5aaa7a","#c85a4b","#4b82c8"];

  let playerCount = 4;
  let times   = [];
  let configs = [];
  let active  = -1;
  let dead    = [];
  let interval = null;
  let paused  = false;

  function fmt(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  }

  function startGame(count) {
    playerCount = count;
    configs = Array(count).fill(600);
    document.getElementById('setup').style.display = 'none';
    document.getElementById('clock-ui').style.display = 'flex';
    resetClocks();
  }

  function goToSetup() {
    clearInterval(interval);
    paused = false;
    document.getElementById('clock-ui').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
  }

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 0; i < playerCount; i++) {
      const div = document.createElement('div');
      div.className = 'player' + (i === active ? ' active' : '') + (dead[i] ? ' dead' : '');
      const color = i === active ? COLORS[i] : '';
      div.innerHTML =
        '<div class="active-dot"></div>' +
        '<div class="player-label" style="' + (color ? 'color:'+color : '') + '">' + NAMES[i] + '</div>' +
        '<div class="timer' + (times[i] <= 10 && !dead[i] ? ' warning' : '') + '" style="' + (color ? 'color:'+color : '') + '">' + fmt(times[i]) + '</div>';
      if (!dead[i]) div.addEventListener('click', (function(idx){ return function(){ handleClick(idx); }; })(i));
      grid.appendChild(div);
    }
    // 3-player: span player 3 across both columns to center it
    if (playerCount === 3) {
      grid.children[2].style.gridColumn = '1 / -1';
      grid.children[2].style.width = 'calc(50% - 6px)';
      grid.children[2].style.margin = '0 auto';
    }
  }

  function handleClick(i) {
    if (dead[i] || paused) return;
    if (active === -1) {
      active = i;
      startTick();
      renderGrid();
      return;
    }
    if (active !== i) return;
    let next = (i + 1) % playerCount;
    while (dead[next] && next !== i) next = (next + 1) % playerCount;
    active = (next === i) ? -1 : next;
    if (active === -1) clearInterval(interval);
    renderGrid();
  }

  function startTick() {
    clearInterval(interval);
    interval = setInterval(function() {
      if (active === -1) return;
      times[active]--;
      if (times[active] <= 0) {
        times[active] = 0;
        dead[active] = true;
        let next = (active + 1) % playerCount;
        while (dead[next] && next !== active) next = (next + 1) % playerCount;
        if (dead.filter(function(d){ return !d; }).length <= 1) {
          clearInterval(interval); active = -1;
        } else { active = next; }
      }
      renderGrid();
    }, 1000);
  }

  function resetClocks() {
    clearInterval(interval);
    paused = false;
    times  = configs.slice();
    dead   = Array(playerCount).fill(false);
    active = -1;
    updatePauseBtn();
    renderGrid();
  }

  function togglePause() {
    if (active === -1) return; // nothing running, nothing to pause
    paused = !paused;
    if (paused) {
      clearInterval(interval);
    } else {
      startTick();
    }
    updatePauseBtn();
    renderGrid();
  }

  function updatePauseBtn() {
    const btn = document.getElementById('pause-btn');
    if (!btn) return;
    btn.textContent = paused ? 'Resume' : 'Pause';
    btn.className   = paused ? 'primary' : '';
  }

  let pausedForSettings = false;

  function openSettings() {
    // Auto-pause if the clock is running
    if (active !== -1 && !paused) {
      paused = true;
      clearInterval(interval);
      updatePauseBtn();
      pausedForSettings = true;
    } else {
      pausedForSettings = false;
    }
    const rows = document.getElementById('settings-rows');
    rows.innerHTML = '';
    for (let i = 0; i < playerCount; i++) {
      const m = Math.floor(configs[i]/60), s = configs[i]%60;
      const swatches = PALETTE.map(function(p) {
        const sel = p.hex === COLORS[i] ? ' selected' : '';
        return '<div class="swatch'+sel+'" data-player="'+i+'" data-hex="'+p.hex+'" style="background:'+p.hex+'" title="'+p.name+'"></div>';
      }).join('');
      rows.innerHTML +=
        '<div class="setting-row">' +
          '<input class="name-input" id="n'+i+'" value="'+NAMES[i]+'" maxlength="16" placeholder="Player '+(i+1)+'">' +
          '<div class="color-swatches" id="sw'+i+'">' + swatches + '</div>' +
          '<div class="time-input">' +
            '<input type="number" id="m'+i+'" value="'+m+'" min="0" max="99">' +
            '<span>:</span>' +
            '<input type="number" id="s'+i+'" value="'+String(s).padStart(2,'0')+'" min="0" max="59">' +
          '</div>' +
        '</div>';
    }
    // Swatch click handler
    document.querySelectorAll('.swatch').forEach(function(el) {
      el.addEventListener('click', function() {
        const pi = this.dataset.player;
        document.querySelectorAll('#sw'+pi+' .swatch').forEach(function(s){ s.classList.remove('selected'); });
        this.classList.add('selected');
      });
    });
    document.getElementById('overlay').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('overlay').classList.remove('open');
    // Resume if we auto-paused when opening settings
    if (pausedForSettings) {
      paused = false;
      pausedForSettings = false;
      startTick();
      updatePauseBtn();
    }
  }

  function applySettings() {
    pausedForSettings = false; // applying resets clocks, no need to resume
    for (let i = 0; i < playerCount; i++) {
      const name = document.getElementById('n'+i).value.trim();
      if (name) NAMES[i] = name;
      const sel = document.querySelector('#sw'+i+' .swatch.selected');
      if (sel) COLORS[i] = sel.dataset.hex;
      const m = parseInt(document.getElementById('m'+i).value)||0;
      const s = parseInt(document.getElementById('s'+i).value)||0;
      configs[i] = m*60 + s;
    }
    closeSettings();
    resetClocks();
  }

  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === document.getElementById('overlay')) closeSettings();
  });
</script>
</body>
</html>
